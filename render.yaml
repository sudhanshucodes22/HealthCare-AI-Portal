# render.yaml — One-click deployment config for Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: healthcare-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false           # You must set this manually in the Render dashboard
      - key: GOOGLE_MAPS_API_KEY
        sync: false           # Optional – leave blank to use free OpenStreetMap
      - key: FRONTEND_URL
        sync: false           # Set to your deployed Vercel/Netlify frontend URL

databases:
  - name: healthcare-db
    databaseName: healthcare
    plan: free
